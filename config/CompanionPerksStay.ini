[Settings]
; Enable (1) or disable (0) corner message notifications when a companion perk is retained.
bShowNotifications = 1

; The interval (in frames) between companion perk checks.
; Default is 300 frames (roughly 5 seconds at 60 FPS).
; Lower values will check more frequently but may slightly impact performance.
iCheckInterval = 300

[Testing]
; Enable (1) or disable (0) test mode.
; Runs a full hire > wait > fire > check cycle for every companion, one at a time.
; Runs once per load. Set to 0 and reload save to reset.
; WARNING: This is for testing only! Disable after testing to avoid breaking quests.
bTestMode = 0

; How long to wait (in seconds) between hiring and firing each companion.
; Must be long enough for the CPS callback to fire and detect the companion.
; Increase if perks are showing FAIL - the callback interval in gl_CompanionPerksStay.txt
; determines the minimum effective value.
iTestWait = 5
