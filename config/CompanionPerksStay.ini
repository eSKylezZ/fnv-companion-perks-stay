[Settings]
; Enable (1) or disable (0) corner message notifications when a companion perk is retained.
bShowNotifications = 1

; The interval (in frames) between companion perk checks.
; Default is 300 frames (roughly 5 seconds at 60 FPS).
; Lower values will check more frequently but may slightly impact performance.
iCheckInterval = 300

[Testing]
; Enable (1) or disable (0) test mode.
; When enabled, all companions will be force-hired and teleported to the player on save load.
; WARNING: This is for testing only! Disable after testing to avoid breaking quests.
bTestMode = 0
